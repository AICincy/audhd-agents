name: corporate-training
display_name: Corporate Training Designer
description: >
  Training program design using ecological psychology and instructional
  design. Certification pathway development for cloud education.
version: "1.0.0"
category: specialized
capabilities:
  - generate
models:
  primary: G-PRO31
  fallback: [G-PRO, O-54P]
sk_hooks:
  - SK-A11Y
  - SK-DECOMP
  - SK-VERIFY
inputs:
  - name: input_text
    type: string
    description: Training requirements, content area, or existing materials to redesign
    required: true
  - name: audience
    type: string
    description: Target learner profile
    required: false
  - name: modality
    type: string
    description: Delivery format
    required: false
outputs:
  - name: program
    type: object
    description: Training program with objectives, modules, assessments
