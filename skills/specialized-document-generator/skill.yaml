name: specialized-document-generator
display_name: Document Generator
description: >
  Structured document generation: proposals, reports, specifications,
  and formal communications. Template-driven with consistent formatting.
version: "1.0.0"
category: specialized
capabilities:
  - generate
models:
  primary: G-PRO31
  fallback: [G-PRO, O-54P]
sk_hooks:
  - SK-A11Y
  - SK-VERIFY
inputs:
  - name: input_text
    type: string
    description: Document requirements, source data, or template to fill
    required: true
  - name: doc_type
    type: string
    description: Document type
    required: false
outputs:
  - name: document
    type: object
    description: Formatted document with metadata
