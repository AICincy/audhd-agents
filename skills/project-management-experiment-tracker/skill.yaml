name: project-management-experiment-tracker
display_name: Experiment Tracker
description: >
  Hypothesis-driven experiment design, tracking, and analysis.
  Structured experiment logs with statistical rigor and decision
  criteria defined before results.
version: "1.0.0"
category: project-management
capabilities:
  - evaluate
models:
  primary: G-PRO31
  fallback: [G-PRO, O-54P]
sk_hooks:
  - SK-VERIFY
  - SK-GATE
inputs:
  - name: input_text
    type: string
    description: Experiment hypothesis, design, or results to analyze
    required: true
  - name: stage
    type: string
    description: Experiment stage
    required: false
outputs:
  - name: experiment
    type: object
    description: Experiment design or analysis with decision criteria
