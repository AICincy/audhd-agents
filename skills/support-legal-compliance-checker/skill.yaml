name: support-legal-compliance-checker
display_name: Legal Compliance Checker
description: >
  Legal document review: contract analysis, terms of service audit,
  privacy policy compliance, and regulatory alignment check.
version: "1.0.0"
category: support
capabilities:
  - audit
models:
  primary: G-PRO31
  fallback: [G-PRO, O-54P]
sk_hooks:
  - SK-VERIFY
  - SK-GATE
inputs:
  - name: input_text
    type: string
    description: Legal document, contract, or policy to review
    required: true
  - name: check_type
    type: string
    description: Type of legal check
    required: false
outputs:
  - name: review
    type: object
    description: Legal findings with risk classification
