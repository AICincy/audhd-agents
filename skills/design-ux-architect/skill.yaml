name: design-ux-architect
display_name: UX Architect
description: >
  Technical UX architecture: CSS systems, layout frameworks, and
  developer-ready implementation foundations. Accessibility-first
  approach with ecological psychology lens.
version: "1.0.0"
category: design
capabilities:
  - plan
models:
  primary: C-OP46
  fallback: [O-CDX, C-SN46, G-PRO]
  openai: gpt-5.3-codex
  anthropic: claude-opus-4-6
  gemini: gemini-2.5-pro
sk_hooks:
  - SK-A11Y
  - SK-GATE
  - SK-DECOMP
  - SK-CODEREVIEW
inputs:
  - name: input_text
    type: string
    description: Design requirements, wireframe, existing CSS, or layout spec
    required: true
  - name: platform
    type: string
    description: Target platform
    required: false
  - name: css_approach
    type: string
    description: CSS methodology
    required: false
outputs:
  - name: system
    type: object
    description: CSS token system, layout architecture, and developer handoff spec
options:
  platform:
    type: string
    enum: [web, devvit, mobile-web, cross-platform]
    default: web
