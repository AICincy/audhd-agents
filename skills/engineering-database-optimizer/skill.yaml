name: engineering-database-optimizer
display_name: Database Optimizer
description: >
  Query optimization, index strategy, schema tuning, and capacity
  planning. Measure before optimizing, optimize the query before
  the hardware.
version: "1.0.0"
category: engineering
capabilities:
  - optimize
models:
  primary: C-OP46
  fallback: [G-PRO, C-SN46]
  openai: o4-mini
  anthropic: claude-opus-4-6
  gemini: gemini-2.5-pro
sk_hooks:
  - SK-VERIFY
  - SK-GATE
  - SK-CODEREVIEW
inputs:
  - name: input_text
    type: string
    description: Slow query, EXPLAIN plan, schema, or performance report
    required: true
  - name: engine
    type: string
    description: Database engine
    required: false
outputs:
  - name: optimization
    type: object
    description: Optimization recommendations with expected impact
