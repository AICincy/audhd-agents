name: lsp-index-engineer
display_name: LSP Index Engineer
description: >
  Language Server Protocol integration: code intelligence, symbol
  indexing, cross-reference resolution, and IDE tooling.
version: "1.0.0"
category: engineering
capabilities:
  - code-intelligence
  - symbol-indexing
  - cross-reference
  - ide-tooling
models:
  primary: C-OP46
  fallback: [C-SN46, G-PRO]
  openai: gpt-5.3-codex
  anthropic: claude-opus-4-6
  gemini: gemini-2.5-pro
sk_hooks:
  - SK-CODEREVIEW
  - SK-DECOMP
inputs:
  - name: input_text
    type: string
    description: Codebase structure, LSP config, or indexing requirements
    required: true
  - name: language
    type: string
    description: Primary programming language
    required: false
outputs:
  - name: config
    type: object
    description: LSP configuration with indexing strategy
