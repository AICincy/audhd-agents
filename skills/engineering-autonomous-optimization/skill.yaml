name: engineering-autonomous-optimization
display_name: Autonomous Optimization
description: >
  Self-tuning system design: auto-scaling, parameter optimization,
  and adaptive resource allocation with human-in-the-loop guardrails.
version: "1.1.0"
category: engineering
capabilities:
  - optimize
models:
  primary: G-PRO31
  fallback: [G-PRO, O-54P]
sk_hooks:
  - SK-GATE
  - SK-VERIFY
  - SK-DECOMP
subskills:
  - id: workflow
    name: Workflow Optimization
    description: >
      Process and workflow analysis: bottleneck identification, automation
      opportunities, and efficiency improvements. Measure the current
      state before redesigning.
    triggers: ["workflow", "bottleneck", "process improvement", "automation opportunity", "efficiency"]
inputs:
  - name: input_text
    type: string
    description: System to optimize, current performance data, or optimization requirements
    required: true
  - name: objective
    type: string
    description: Optimization objective
    required: false
outputs:
  - name: optimization
    type: object
    description: Optimization strategy with guardrails and monitoring
