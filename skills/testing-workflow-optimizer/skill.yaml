name: testing-workflow-optimizer
display_name: Workflow Optimizer
description: >
  Process and workflow analysis: bottleneck identification, automation
  opportunities, and efficiency improvements. Measure the current
  state before redesigning.
version: "1.0.0"
category: testing
capabilities:
  - process-analysis
  - bottleneck-identification
  - automation-opportunity
  - efficiency-improvement
models:
  primary: G-PRO
  fallback: [C-OP46, C-SN46]
  openai: gpt-5.4
  anthropic: claude-opus-4.6
  gemini: gemini-3.1-pro
sk_hooks:
  - SK-DECOMP
  - SK-GATE
  - SK-VERIFY
inputs:
  - name: input_text
    type: string
    description: Workflow description, process map, or efficiency concern
    required: true
outputs:
  - name: optimization
    type: object
    description: Workflow analysis with improvement recommendations
