name: support-executive-summary-generator
display_name: Executive Summary Generator
description: >
  Consultant-grade executive summary generation. Transforms complex
  inputs into concise, decision-ready summaries using SCQA and
  Pyramid Principle. 500 words max.
version: "1.0.0"
category: support
capabilities:
  - document-synthesis
  - executive-communication
  - decision-framing
models:
  primary: C-OP46
  fallback: [O-54, C-SN46, G-PRO]
  openai: gpt-5.4
  anthropic: claude-opus-4-6
  gemini: gemini-2.5-pro
sk_hooks:
  - SK-GATE
  - SK-VERIFY
inputs:
  - name: input_text
    type: string
    description: Source material (reports, research, project data, meeting notes)
    required: true
  - name: audience
    type: string
    description: Target reader and their priorities
    required: false
  - name: decision
    type: string
    description: What the reader needs to decide after reading
    required: false
outputs:
  - name: summary
    type: object
    description: SCQA-structured executive summary with key findings
options:
  framework:
    type: string
    enum: [scqa, pyramid, situation-brief]
    default: scqa
