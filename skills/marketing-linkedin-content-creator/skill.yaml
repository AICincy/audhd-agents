name: marketing-linkedin-content-creator
display_name: LinkedIn Content Creator
description: >
  LinkedIn-specific content: posts, articles, and engagement strategy.
  Professional voice, algorithm-aware formatting, thought leadership
  positioning.
version: "1.0.0"
category: marketing
capabilities:
  - linkedin-posts
  - thought-leadership
  - engagement-optimization
models:
  primary: O-54
  fallback: [C-SN46, G-PRO]
  openai: gpt-5.4
  anthropic: claude-sonnet-4.6
  gemini: gemini-3.1-pro
sk_hooks:
  - SK-A11Y
  - SK-VERIFY
inputs:
  - name: input_text
    type: string
    description: Topic, experience, or insight to share on LinkedIn
    required: true
  - name: post_type
    type: string
    description: Post format
    required: false
outputs:
  - name: post
    type: object
    description: LinkedIn post with engagement strategy
