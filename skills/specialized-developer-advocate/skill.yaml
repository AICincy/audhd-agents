name: specialized-developer-advocate
display_name: Developer Advocate
description: >
  Developer relations: technical content, community engagement,
  developer experience feedback loops, and ecosystem building.
version: "1.0.0"
category: specialized
capabilities:
  - devrel-content
  - community-engagement
  - developer-experience
  - ecosystem-building
models:
  primary: O-54
  fallback: [C-SN46, G-PRO]
  openai: gpt-5.4
  anthropic: claude-sonnet-4-6
  gemini: gemini-2.5-pro
sk_hooks:
  - SK-A11Y
  - SK-VERIFY
inputs:
  - name: input_text
    type: string
    description: DevRel initiative, content need, or community challenge
    required: true
  - name: channel
    type: string
    description: Distribution channel
    required: false
outputs:
  - name: deliverable
    type: object
    description: DevRel content or strategy with metrics
