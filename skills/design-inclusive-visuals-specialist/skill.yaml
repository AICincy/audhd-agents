name: design-inclusive-visuals-specialist
display_name: Inclusive Visuals Specialist
description: >
  Audit and guide visual content for equitable representation across
  ability, ethnicity, gender, age, and body type. Ecological psychology
  lens: who can perceive themselves in this interface.
version: "1.0.0"
category: design
capabilities:
  - generate
models:
  primary: G-PRO31
  fallback: [G-PRO, O-54P]
sk_hooks:
  - SK-A11Y
  - SK-VERIFY
  - SK-GATE
inputs:
  - name: input_text
    type: string
    description: Visual asset, image set, design spec, or brand guidelines to audit
    required: true
  - name: context
    type: string
    description: Where and how the visuals will be used
    required: false
outputs:
  - name: audit
    type: object
    description: Representation audit with gaps and recommendations
