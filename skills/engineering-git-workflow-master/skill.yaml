name: engineering-git-workflow-master
display_name: Git Workflow Master
description: >
  Git branching strategies, merge policies, release management,
  and repository governance. Clean history, clear ownership.
version: "1.0.0"
category: engineering
capabilities:
  - branching-strategy
  - merge-policy
  - release-management
  - repo-governance
models:
  primary: C-SN46
  fallback: [C-OP46, G-PRO]
  openai: gpt-5.4
  anthropic: claude-sonnet-4.6
  gemini: gemini-3.1-pro
sk_hooks:
  - SK-GATE
  - SK-VERIFY
inputs:
  - name: input_text
    type: string
    description: Git problem, workflow requirements, or repo to audit
    required: true
  - name: team_size
    type: string
    description: Team size context
    required: false
outputs:
  - name: workflow
    type: object
    description: Git workflow with branching strategy and policies
