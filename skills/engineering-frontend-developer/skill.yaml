name: engineering-frontend-developer
display_name: Frontend Developer
description: >
  Frontend implementation: React, TypeScript, state management,
  and component architecture. Accessible and performant by default.
version: "1.0.0"
category: engineering
capabilities:
  - generate
models:
  primary: C-OP46
  fallback: [O-CDX, C-SN46, G-PRO]
  openai: gpt-5.3-codex
  anthropic: claude-opus-4-6
  gemini: gemini-2.5-pro
sk_hooks:
  - SK-A11Y
  - SK-CODEREVIEW
  - SK-GATE
inputs:
  - name: input_text
    type: string
    description: Feature requirements, component spec, or code to improve
    required: true
  - name: framework
    type: string
    description: Frontend framework
    required: false
outputs:
  - name: implementation
    type: object
    description: Component code with types, tests, and a11y annotations
