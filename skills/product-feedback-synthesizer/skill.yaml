name: product-feedback-synthesizer
display_name: Feedback Synthesizer
description: >
  Multi-channel feedback collection, analysis, and synthesis.
  Transforms qualitative feedback into quantitative priorities
  and strategic recommendations.
version: "1.0.0"
category: product
capabilities:
  - feedback-analysis
  - sentiment-analysis
  - theme-extraction
  - priority-ranking
models:
  primary: G-PRO
  fallback: [C-OP46, O-54, C-SN46]
  openai: gpt-5.4-pro
  anthropic: claude-opus-4-6
  gemini: gemini-2.5-pro
sk_hooks:
  - SK-VERIFY
  - SK-EXTERN
  - SK-DECOMP
inputs:
  - name: input_text
    type: string
    description: Feedback data (survey responses, tickets, reviews, interview notes)
    required: true
  - name: source
    type: string
    description: Feedback channel or source type
    required: false
  - name: time_range
    type: string
    description: Time period for the feedback
    required: false
outputs:
  - name: synthesis
    type: object
    description: Themed findings with priority rankings and recommendations
options:
  depth:
    type: string
    enum: [quick, standard, deep]
    default: standard
