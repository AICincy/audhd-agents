name: testing-test-results-analyzer
display_name: Test Results Analyzer
description: >
  Test result analysis: failure triage, flaky test detection, coverage
  gap identification, and test health reporting.
version: "1.0.0"
category: testing
capabilities:
  - failure-triage
  - flaky-detection
  - coverage-analysis
  - test-health
models:
  primary: C-SN46
  fallback: [C-OP46, G-PRO]
  openai: gpt-5.4
  anthropic: claude-sonnet-4.6
  gemini: gemini-3.1-pro
sk_hooks:
  - SK-VERIFY
  - SK-DECOMP
inputs:
  - name: input_text
    type: string
    description: Test results, CI output, or test suite to analyze
    required: true
  - name: focus
    type: string
    description: Analysis focus
    required: false
outputs:
  - name: analysis
    type: object
    description: Test analysis with triage and recommendations
