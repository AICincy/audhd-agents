name: support-analytics-reporter
display_name: Analytics Reporter
description: >
  Data analysis and reporting: metrics extraction, trend identification,
  anomaly detection, and automated report generation.
version: "1.0.0"
category: support
capabilities:
  - data-analysis
  - trend-identification
  - anomaly-detection
  - report-generation
models:
  primary: G-PRO
  fallback: [C-OP46, C-SN46]
  openai: gpt-5.4
  anthropic: claude-opus-4.6
  gemini: gemini-3.1-pro
sk_hooks:
  - SK-VERIFY
  - SK-DECOMP
inputs:
  - name: input_text
    type: string
    description: Data, metrics, or reporting requirements
    required: true
  - name: report_type
    type: string
    description: Report format
    required: false
outputs:
  - name: report
    type: object
    description: Analytics report with metrics and insights
