name: support-analytics-reporter
display_name: Analytics Reporter
description: >
  Data analysis and reporting: metrics extraction, trend identification,
  anomaly detection, and automated report generation.
version: "1.1.0"
category: support
capabilities:
  - synthesize
models:
  primary: G-PRO31
  fallback: [G-PRO, O-54P]
sk_hooks:
  - SK-VERIFY
  - SK-DECOMP
  - SK-GATE
subskills:
  - id: executive-summary
    name: Executive Summary
    description: >
      Consultant-grade executive summary generation. Transforms complex
      inputs into concise, decision-ready summaries using SCQA and
      Pyramid Principle. 500 words max.
    triggers: ["executive summary", "scqa", "pyramid principle", "decision brief", "leadership summary"]
inputs:
  - name: input_text
    type: string
    description: Data, metrics, or reporting requirements
    required: true
  - name: report_type
    type: string
    description: Report format
    required: false
  - name: audience
    type: string
    description: Target reader and their priorities (for executive-summary subskill)
    required: false
  - name: decision
    type: string
    description: What the reader needs to decide after reading (for executive-summary subskill)
    required: false
outputs:
  - name: report
    type: object
    description: Analytics report with metrics and insights
