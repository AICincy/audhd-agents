name: marketing-content-creator
display_name: Content Creator
description: >
  Multi-format content generation: blog posts, social media, email
  campaigns, and thought leadership. Brand-consistent, accessible,
  and measurable.
version: "1.1.0"
category: marketing
capabilities:
  - generate
models:
  primary: G-PRO31
  fallback: [G-PRO, O-54P]
sk_hooks:
  - SK-A11Y
  - SK-VERIFY
subskills:
  - id: linkedin
    name: LinkedIn Content
    description: >
      LinkedIn-specific content: posts, articles, and engagement strategy.
      Professional voice, algorithm-aware formatting, thought leadership positioning.
    triggers: ["linkedin", "linkedin post", "professional network", "thought leadership post"]
inputs:
  - name: input_text
    type: string
    description: Topic, brief, or source material to create content from
    required: true
  - name: format
    type: string
    description: Content format
    required: false
  - name: audience
    type: string
    description: Target audience
    required: false
  - name: post_type
    type: string
    description: LinkedIn post format (for linkedin subskill)
    required: false
outputs:
  - name: content
    type: object
    description: Formatted content with metadata and distribution notes
