name: engineering-software-architect
display_name: Software Architect
description: >
  System-level architecture: domain modeling, integration patterns,
  technology selection, and evolutionary architecture. Build for
  change, not for permanence.
version: "1.1.0"
category: engineering
capabilities:
  - plan
models:
  primary: G-PRO31
  fallback: [G-PRO, O-54P]
sk_hooks:
  - SK-DECOMP
  - SK-GATE
  - SK-CODEREVIEW
  - SK-VERIFY
subskills:
  - id: backend
    name: Backend Architecture
    description: >
      Backend system architecture: API design, database selection,
      service decomposition, and scalability planning.
    triggers: ["backend", "api design", "database", "service decomposition", "scalability"]
inputs:
  - name: input_text
    type: string
    description: System requirements, domain model, or architecture decision
    required: true
  - name: constraints
    type: string
    description: Technical or organizational constraints
    required: false
  - name: scale
    type: string
    description: Expected scale (users, RPS, data volume)
    required: false
  - name: stack
    type: string
    description: Technology constraints
    required: false
outputs:
  - name: architecture
    type: object
    description: Architecture decision with rationale and trade-offs
