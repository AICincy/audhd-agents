name: engineering-ai-data-remediation
display_name: AI Data Remediation
description: >
  Data quality triage for AI/ML pipelines. Detect drift, bias,
  corruption, and schema violations. Produce remediation plans
  with rollback paths.
version: "1.0.0"
category: engineering
capabilities:
  - transform
models:
  primary: G-PRO31
  fallback: [G-PRO, O-54P]
sk_hooks:
  - SK-VERIFY
  - SK-GATE
  - SK-DECOMP
inputs:
  - name: input_text
    type: string
    description: Dataset description, schema, sample data, or data quality report
    required: true
  - name: pipeline
    type: string
    description: Pipeline context
    required: false
outputs:
  - name: remediation
    type: object
    description: Data quality findings with remediation plan
