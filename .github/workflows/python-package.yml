name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
    - name: Compile Python sources
      run: |
        python -m compileall adapters scripts build.py
    - name: Validate repo config surfaces
      run: |
        python scripts/check_connections.py --mode config
    - name: Rebuild manifests
      run: |
        python build.py
    - name: Fail on dist drift
      run: |
        git diff --exit-code -- dist
    - name: Run unit tests
      run: |
        pytest -q
