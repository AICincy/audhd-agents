# Provider configuration for audhd-agents
# Model routing and capability mapping

providers:
  anthropic:
    env_key: ANTHROPIC_API_KEY
    base_url: https://api.anthropic.com/v1
    models:
      claude-opus-4-6:
        id: claude-opus-4-6
        alias: C-OP46
        tier: T4
        context_window: 200000
        max_output: 32000
        strengths:
          - complex-reasoning
          - code-generation
          - long-context
          - multi-step-analysis
      claude-opus-4-5-20251101:
        id: claude-opus-4-5-20251101
        alias: C-OP45
        tier: T4
        context_window: 200000
        max_output: 32000
        strengths:
          - complex-reasoning
          - code-generation
          - long-context
      claude-sonnet-4-6:
        id: claude-sonnet-4-6
        alias: C-SN46
        tier: T2
        context_window: 200000
        max_output: 16000
        strengths:
          - fast-execution
          - code-generation
          - balanced-cost
      claude-sonnet-4-5-20250929:
        id: claude-sonnet-4-5-20250929
        alias: C-SN45
        tier: T2
        context_window: 200000
        max_output: 16000
        strengths:
          - fast-execution
          - code-generation
          - balanced-cost

  openai:
    env_key: OPENAI_API_KEY
    base_url: https://api.openai.com/v1
    models:
      gpt-5.4:
        id: gpt-5.4
        alias: O-54
        tier: T3
        context_window: 128000
        max_output: 16384
        strengths:
          - creative-writing
          - content-generation
          - general-purpose
      gpt-5.3:
        id: gpt-5.3
        alias: O-53
        tier: T3
        context_window: 128000
        max_output: 16384
        strengths:
          - general-purpose
          - content-generation
          - balanced-cost
      gpt-5.4-pro:
        id: gpt-5.4-pro
        alias: O-54P
        tier: T5
        context_window: 128000
        max_output: 16384
        strengths:
          - deep-reasoning
          - complex-analysis
      gpt-5.3-codex:
        id: gpt-5.3-codex
        alias: O-CDX
        tier: T3
        context_window: 128000
        max_output: 16384
        strengths:
          - code-generation
          - code-review
          - refactoring
      gpt-max:
        id: gpt-max
        alias: O-MAX
        tier: T2
        context_window: 128000
        max_output: 16384
        strengths:
          - general-purpose
          - overflow
          - multi-domain
      o4-mini:
        id: o4-mini
        alias: O-O4M
        tier: T1
        context_window: 128000
        max_output: 65536
        strengths:
          - reasoning-chains
          - math
          - fast-cheap

  google:
    env_key: GOOGLE_API_KEY
    base_url: https://generativelanguage.googleapis.com/v1beta
    project_id_env: GOOGLE_PROJECT_ID
    vertex_mode_env: GOOGLE_GENAI_USE_VERTEXAI
    vertex_api_key_env: VERTEX_API_KEY
    vertex_project_env: GOOGLE_CLOUD_PROJECT
    vertex_location_env: GOOGLE_CLOUD_LOCATION
    vertex_service_account_env: VERTEX_SERVICE_ACCOUNT
    vertex_service_account_file_env: VERTEX_SERVICE_ACCOUNT_FILE
    google_application_credentials_env: GOOGLE_APPLICATION_CREDENTIALS
    vertex_default_location: global
    models:
      gemini-2.5-pro:
        id: gemini-2.5-pro
        alias: G-PRO
        tier: T3
        context_window: 1048576
        max_output: 65536
        strengths:
          - massive-context
          - multimodal
          - data-analysis
          - cost-effective

# Alias resolution map (used by skill.yaml model references)
alias_map:
  C-OP46: anthropic/claude-opus-4-6
  C-OP45: anthropic/claude-opus-4-5-20251101
  C-SN46: anthropic/claude-sonnet-4-6
  C-SN45: anthropic/claude-sonnet-4-5-20250929
  O-54: openai/gpt-5.4
  O-53: openai/gpt-5.3
  O-54P: openai/gpt-5.4-pro
  O-CDX: openai/gpt-5.3-codex
  O-MAX: openai/gpt-max
  O-O4M: openai/o4-mini
  G-PRO: google/gemini-2.5-pro

# Circuit breakers (applied to all provider adapters)
circuit_breaker:
  failure_threshold: 3
  recovery_timeout: 60
  half_open_requests: 1
